name: MapMaster
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  MapMaster:
    type: application
    platform: iOS
    sources:
      - path: MapMaster
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.mapmaster
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: MapMaster/Info.plist
        CODE_SIGN_ENTITLEMENTS: MapMaster/MapMaster.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  MapMasterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MapMasterTests
      - path: MapMaster.storekit
    dependencies:
      - target: MapMaster
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.mapmaster.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  MapMaster:
    build:
      targets:
        MapMaster: all
        MapMasterTests: [test]
    run:
      config: Debug
      storeKitConfiguration: MapMaster.storekit
    test:
      config: Debug
      storeKitConfiguration: MapMaster.storekit
      targets:
        - MapMasterTests
    archive:
      config: Release
